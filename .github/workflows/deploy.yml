name: Deploy su Aruba (FTP)

# Ad ogni push su main: ricostruisce il sito e carica dist/ su Aruba via FTP.
# Puoi anche lanciarlo a mano dalla tab "Actions" (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # HAS_FTP è "true" solo quando i 3 secret FTP sono configurati.
    # Così, finché non li aggiungi, lo step di upload viene SALTATO e il workflow non fallisce.
    env:
      HAS_FTP: ${{ secrets.ARUBA_FTP_HOST != '' && secrets.ARUBA_FTP_USER != '' && secrets.ARUBA_FTP_PASS != '' }}
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v5

      - name: Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Installa dipendenze
        run: npm ci

      - name: Build del sito (genera dist/)
        run: npm run build

      - name: Carica dist/ su Aruba via FTP
        if: env.HAS_FTP == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}      # es. ftp.moledigitale.it
          username: ${{ secrets.ARUBA_FTP_USER }}    # utente FTP del pannello Aruba
          password: ${{ secrets.ARUBA_FTP_PASS }}    # password FTP
          protocol: ftps                             # Aruba supporta FTPS; se non va, prova "ftp"
          port: 21
          local-dir: ./dist/
          # ⚠️ Cartella PUBBLICA sul server. Su questo hosting Aruba i file del sito stanno dentro
          #    "www.moledigitale.it/" (accanto alle cartelle di backup), NON nella root FTP.
          #    Dopo il PRIMO run controlla dove sono finiti i file: se sono nella root accanto a
          #    "www.moledigitale.it", questo valore è giusto; se la tua utenza FTP entra già dentro
          #    la cartella pubblica, rimetti "./".
          server-dir: ./www.moledigitale.it/
          # NON cancella i file presenti solo sul server (così mail-config.php caricato a mano resta).
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Avviso (secret FTP non ancora configurati)
        if: env.HAS_FTP != 'true'
        run: |
          echo "::notice::Build OK. Upload FTP saltato perche' mancano i secret. Aggiungi ARUBA_FTP_HOST / ARUBA_FTP_USER / ARUBA_FTP_PASS per attivare il deploy su Aruba."
