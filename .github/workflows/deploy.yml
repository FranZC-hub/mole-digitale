name: Deploy su Aruba (FTP)

# Ad ogni push su main: ricostruisce il sito e carica dist/ su Aruba via FTP.
# Puoi anche lanciarlo a mano dalla tab "Actions" (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_resync:
        description: "Re-sync COMPLETO: rimuove i file orfani vecchi dal server (mail-config.php, leads.csv e stats.csv restano protetti). Usalo se il sito mostra asset mancanti/rotti dopo un deploy."
        type: boolean
        default: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # HAS_FTP è "true" solo quando i 3 secret FTP sono configurati.
    # Così, finché non li aggiungi, lo step di upload viene SALTATO e il workflow non fallisce.
    env:
      HAS_FTP: ${{ secrets.ARUBA_FTP_HOST != '' && secrets.ARUBA_FTP_USER != '' && secrets.ARUBA_FTP_PASS != '' }}
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v5

      - name: Node 24
        uses: actions/setup-node@v5
        with:
          # Node 24 (npm 11): stesso major con cui è generato package-lock.json,
          # così `npm ci` non fallisce per le dipendenze opzionali (es. @emnapi/*).
          node-version: 24
          cache: npm

      - name: Installa dipendenze
        # `npm install` e NON `npm ci`: il package-lock.json e' generato su Windows e
        # non contiene le dipendenze opzionali specifiche di Linux (es. @emnapi/*),
        # per cui `npm ci` fallirebbe su runner Linux. `npm install` risolve quelle
        # giuste della piattaforma al volo (il lock resta comunque come riferimento).
        run: npm install --no-audit --no-fund

      - name: Build del sito (genera dist/)
        run: npm run build

      - name: Verifica link interni (blocca il deploy se rotti)
        run: node tools/check-links.mjs

      - name: Carica dist/ su Aruba via FTP
        if: env.HAS_FTP == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.ARUBA_FTP_HOST }}      # es. ftp.moledigitale.it
          username: ${{ secrets.ARUBA_FTP_USER }}    # utente FTP del pannello Aruba
          password: ${{ secrets.ARUBA_FTP_PASS }}    # password FTP
          protocol: ftps                             # Aruba supporta FTPS; se non va, prova "ftp"
          port: 21
          local-dir: ./dist/
          # ⚠️ Cartella PUBBLICA sul server. Su questo hosting Aruba i file del sito stanno dentro
          #    "www.moledigitale.it/" (accanto alle cartelle di backup), NON nella root FTP.
          #    Dopo il PRIMO run controlla dove sono finiti i file: se sono nella root accanto a
          #    "www.moledigitale.it", questo valore è giusto; se la tua utenza FTP entra già dentro
          #    la cartella pubblica, rimetti "./".
          server-dir: ./www.moledigitale.it/
          # Di norma incrementale (mantiene i file solo-server). Con "full_resync" fa pulizia
          # totale degli orfani; i file in "exclude" qui sotto restano comunque intoccati.
          dangerous-clean-slate: ${{ github.event.inputs.full_resync == 'true' }}
          # Verbose: aiuta a capire cosa carica/cancella se qualcosa va storto.
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            mail-config.php
            mail-config.example.php
            leads.csv
            stats.csv

      - name: Avviso (secret FTP non ancora configurati)
        if: env.HAS_FTP != 'true'
        run: |
          echo "::notice::Build OK. Upload FTP saltato perche' mancano i secret. Aggiungi ARUBA_FTP_HOST / ARUBA_FTP_USER / ARUBA_FTP_PASS per attivare il deploy su Aruba."
