<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="'Space Grotesk', sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#ff6b88"/>
    </linearGradient>
    <radialGradient id="b1" cx="0.2" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b2" cx="0.9" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#07070c"/>
  <rect width="1200" height="630" fill="url(#b1)"/>
  <rect width="1200" height="630" fill="url(#b2)"/>

  <!-- brand -->
  <g transform="translate(80,78) scale(2.2)">
    <rect width="24" height="24" rx="6" fill="url(#g)"/>
    <g fill="#fff">
      <path d="M12 3.2l.55 5.6h-1.1z"/>
      <path d="M11.6 8.8C9.8 9.9 9.3 11.6 10.2 12.9h3.6c.9-1.3.4-3-1.4-4.1z"/>
