    </g>
  </g>
  <text x="150" y="120" font-size="44" font-weight="700" fill="#f3f3fb">Mole <tspan fill="url(#g)">Digitale</tspan></text>

  <!-- headline -->
  <text x="80" y="300" font-size="96" font-weight="700" fill="#f3f3fb">Il tuo sito,</text>
  <text x="80" y="410" font-size="96" font-weight="700" fill="url(#g)">rifatto come si deve.</text>

  <!-- sub -->
  <text x="82" y="500" font-size="36" font-weight="500" fill="#a4a4c0" font-family="'Inter', sans-serif">Siti web moderni per esercenti · Torino e provincia · a costo ridotto</text>

  <!-- tag -->
  <rect x="80" y="540" width="300" height="56" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <text x="110" y="577" font-size="26" font-weight="600" fill="#22d3ee" font-family="'Inter', sans-serif">📞 Preventivo gratis in 24h</text>
